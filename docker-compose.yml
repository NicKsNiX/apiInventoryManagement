version: '3.8'

services:
  api:
    build: .
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
    volumes:
      - ./uploads:/root/uploads
    env_file:
      - .env
    # Uncomment the following if you need a database service
    # depends_on:
